name: pre-push-gate

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate lockfiles
        run: npm run gate:lockfiles

      - name: Validate lockfile integrity
        run: npm run gate:deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 2200" width="920" height="2200">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#384ffe;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a3dcc;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#384ffe"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="24" y="20" width="872" height="56" rx="10" fill="url(#hdr)"/>
  <text x="460" y="58" text-anchor="middle" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">
    Fluxo: geracao das 12 imagens da campanha IA (ai-step2)
  </text>

  <!-- Legend -->
  <g transform="translate(40, 92)">
    <rect width="840" height="72" rx="8" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="20" y="26" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Legenda</text>
    <rect x="20" y="36" width="14" height="14" rx="3" fill="#dbeafe" stroke="#384ffe"/>
    <text x="42" y="48" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">Edge Function / servico</text>
    <rect x="220" y="36" width="14" height="14" rx="3" fill="#fef3c7" stroke="#d97706"/>
    <text x="242" y="48" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">Dados (Postgres / Storage)</text>
    <rect x="420" y="36" width="14" height="14" rx="3" fill="#ecfdf5" stroke="#059669"/>
    <text x="442" y="48" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">Cliente / operacao</text>
  </g>

  <!-- Column 1: Trigger -->
  <g transform="translate(40, 188)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#384ffe">1 - Gatilho</text>
    <rect y="12" width="400" height="168" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect x="16" y="28" width="368" height="44" rx="6" fill="#ecfdf5" stroke="#059669"/>
    <text x="24" y="46" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Cliente conclui identidade com site_url OU instagram_handle</text>
    <text x="24" y="62" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">SPA -> save-onboarding-identity</text>
    <rect x="16" y="84" width="368" height="40" rx="6" fill="#dbeafe" stroke="#384ffe"/>
    <text x="24" y="102" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">Dispara pipeline onboarding-enrichment</text>
    <text x="24" y="116" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Service role - fases: cores, fonte, briefing, job IA</text>
    <rect x="16" y="132" width="368" height="36" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="24" y="150" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#92400e">Tabelas: onboarding_identity, onboarding_briefings, compras, celebridades...</text>
  </g>

  <!-- Column 2: Eligibility -->
  <g transform="translate(460, 188)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#384ffe">2 - Elegibilidade</text>
    <rect y="12" width="420" height="168" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="20" y="40" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">create-ai-campaign-job verifica gate (CONTRACT):</text>
    <text x="20" y="58" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">- clicksign_status = Assinado</text>
    <text x="20" y="74" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">- checkout pago OU onboarding_access allowed (nao expirado)</text>
    <rect x="16" y="88" width="388" height="36" rx="6" fill="#fee2e2" stroke="#ef4444"/>
    <text x="24" y="110" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Se falhar -> NOT_ELIGIBLE (sem job)</text>
    <rect x="16" y="132" width="388" height="36" rx="6" fill="#ecfdf5" stroke="#059669"/>
    <text x="24" y="154" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Se OK -> segue orquestracao</text>
  </g>

  <path d="M 440 270 L 450 270" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Section 3: Orchestrator -->
  <g transform="translate(40, 392)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#384ffe">3 - Orquestrador (create-ai-campaign-job)</text>
    <rect y="12" width="840" height="320" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="20" y="40" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Body: { compra_id } - demais dados lidos do banco (identity, cliente, celebridade, briefing done, NanoBanana config).</text>
    <text x="20" y="58" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Signed URLs: logo / imagens de campanha no bucket onboarding-identity, foto celebridade, referencia por categoria (nanobanana-references).</text>
    <rect x="16" y="72" width="808" height="52" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="24" y="92" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#0f172a">Prompt: buildPrompt(PromptInput, group, format)</text>
    <text x="24" y="108" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#475569">GLOBAL_RULES (arte + rosto celebridade + PT-BR + paleta marca) + direcao MODERNA/CLEAN/RETAIL + instrucao de aspect ratio + briefing/insights se existirem</text>
    <rect x="16" y="132" width="808" height="44" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="24" y="152" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#92400e">Idempotencia: input_hash (SHA-256 dos inputs canonizados) inclui briefing/insights - evita job duplicado com mesmos inputs</text>
    <rect x="16" y="184" width="250" height="64" rx="6" fill="#dbeafe" stroke="#384ffe"/>
    <text x="30" y="206" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">ai_campaign_jobs</text>
    <text x="30" y="222" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">status: processing - total_expected: 12</text>
    <rect x="282" y="184" width="270" height="64" rx="6" fill="#dbeafe" stroke="#384ffe"/>
    <text x="298" y="206" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">ai_campaign_assets x 12</text>
    <text x="298" y="222" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">pending - 3 grupos x 4 formatos</text>
    <rect x="564" y="184" width="260" height="64" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="578" y="206" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#5b21b6">EdgeRuntime.waitUntil</text>
    <text x="578" y="222" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6d28d9">Loop em background: POST interno por asset</text>
    <text x="20" y="268" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155">Matriz fixa: grupos moderna, clean, retail x formatos 1:1, 4:5, 16:9, 9:16 = 12 combinacoes (_shared/ai-campaign/prompt-builder.ts)</text>
    <text x="20" y="286" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Resposta imediata ao chamador: { job_id, status: processing } - geracao continua assincrona</text>
    <text x="20" y="312" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Ao terminar o lote: reconcilia assets presos + status final do job (completed / partial / failed)</text>
  </g>

  <!-- Section 4: Worker -->
  <g transform="translate(40, 748)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#384ffe">4 - Worker por asset (generate-ai-campaign-image)</text>
    <rect y="12" width="840" height="280" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="20" y="38" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#334155">Autenticacao: requireServiceRole - so chamada server-to-server (orquestrador), nao o browser.</text>
    <rect x="16" y="50" width="808" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="24" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#475569">1. UPDATE asset -> processing  |  2. generateImage() em _shared/ai-campaign/image-generator.ts</text>
    <rect x="16" y="94" width="400" height="120" rx="6" fill="#fff7ed" stroke="#ea580c"/>
    <text x="28" y="116" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#9a3412">Gemini (GEMINI_API_KEY)</text>
    <text x="28" y="134" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c2d12">- Prompt texto + imagens: celebridade PNG, logo, campanha opcional, referencia categoria</text>
    <text x="28" y="150" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c2d12">- aspect_ratio, temperature, safety_settings (config NanoBanana)</text>
    <text x="28" y="166" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c2d12">- Retries: ate 2 retentativas com backoff (1s, 3s) por chamada</text>
    <text x="28" y="190" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7c2d12">- Download de URLs com limite de bytes (env AI_CAMPAIGN_MAX_IMAGE_DOWNLOAD_BYTES)</text>
    <rect x="432" y="94" width="392" height="120" rx="6" fill="#ecfdf5" stroke="#059669"/>
    <text x="446" y="116" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Sucesso</text>
    <text x="446" y="134" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#166534">Upload Storage -> image_url / dimensoes -> asset completed</text>
    <text x="446" y="152" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#166534">Atualiza contagem total_generated no job</text>
    <text x="446" y="176" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Falha</text>
    <text x="446" y="194" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#7f1d1d">asset failed + ai_campaign_errors (tipo: model_error, upload_error, worker_*, etc.)</text>
    <text x="20" y="236" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Falhas na chamada HTTP ao worker tambem sao persistidas pelo orquestrador (worker_http_error, worker_response_invalid, worker_call_exception).</text>
    <text x="20" y="256" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748b">Reconciliacao: assets pending/processing podem virar failed (ex.: stale_processing_timeout) ao fechar o lote.</text>
  </g>

  <!-- Section 5: Monitor -->
  <g transform="translate(40, 1068)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#384ffe">5 - Monitoramento e reprocessamento</text>
    <rect y="12" width="840" height="200" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect x="16" y="28" width="400" height="168" rx="6" fill="#dbeafe" stroke="#384ffe"/>
    <text x="28" y="50" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">Frontend: /ai-step2/monitor?job_id=UUID</text>
    <text x="28" y="68" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">get-ai-campaign-monitor - polling 3s (pending/processing) ou 15s estavel</text>
    <text x="28" y="86" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">Abas: Galeria, Dados onboarding, Erros/diagnostico</text>
    <text x="28" y="104" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#475569">ImageViewer: preview, zoom, download</text>
    <rect x="432" y="28" width="392" height="168" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="446" y="50" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#5b21b6">retry-ai-campaign-assets</text>
    <text x="446" y="68" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6d28d9">Retry por asset, categoria ou todos falhos - re-enfileira worker</text>
    <text x="446" y="92" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Separado do fluxo Aurea Garden (Post Gen / Post Turbo):</text>
    <text x="446" y="108" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">aqueles usam post-gen-generate / post-turbo-generate sob demanda.</text>
  </g>

  <g transform="translate(40, 1300)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#384ffe">Visao linear (resumo)</text>
    <rect y="16" width="840" height="120" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect x="20" y="36" width="100" height="72" rx="6" fill="#ecfdf5" stroke="#059669"/>
    <text x="70" y="62" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#065f46">Cliente</text>
    <text x="70" y="78" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#166534">identidade</text>
    <text x="70" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#166534">site/IG</text>
    <path d="M 122 72 L 138 72" stroke="#384ffe" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="140" y="36" width="108" height="72" rx="6" fill="#dbeafe" stroke="#384ffe"/>
    <text x="194" y="60" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#1e3a8a">save-onboarding</text>
    <text x="194" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#1e3a8a">identity</text>
    <text x="194" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#475569">dispara</text>
    <path d="M 250 72 L 266 72" stroke="#384ffe" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="268" y="36" width="100" height="72" rx="6" fill="#dbeafe" stroke="#384ffe"/>
    <text x="318" y="58" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#1e3a8a">onboarding</text>
    <text x="318" y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#1e3a8a">enrichment</text>
    <text x="318" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#475569">briefing...</text>
    <path d="M 370 72 L 386 72" stroke="#384ffe" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="388" y="36" width="118" height="72" rx="6" fill="#dbeafe" stroke="#384ffe"/>
    <text x="447" y="58" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#1e3a8a">create-ai-campaign</text>
    <text x="447" y="72" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#1e3a8a">-job</text>
    <text x="447" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#475569">job + 12 rows</text>
    <path d="M 508 72 L 524 72" stroke="#384ffe" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="526" y="28" width="130" height="88" rx="6" fill="#fff7ed" stroke="#ea580c"/>
    <text x="591" y="50" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#9a3412">generate-ai-</text>
    <text x="591" y="64" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#9a3412">campaign-image</text>
    <text x="591" y="82" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#7c2d12">x12 + Gemini</text>
    <text x="591" y="96" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#7c2d12">+ Storage</text>
    <path d="M 658 72 L 674 72" stroke="#384ffe" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <rect x="676" y="36" width="144" height="72" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="748" y="58" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#92400e">ai_campaign_*</text>
    <text x="748" y="74" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a16207">jobs + assets</text>
    <text x="748" y="92" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#92400e">+ erros</text>
  </g>

  <g transform="translate(40, 1450)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#384ffe">Modelo de dados (resumo)</text>
    <rect y="16" width="840" height="200" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="20" y="44" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155">ai_campaign_jobs: id, compra_id, status, input_hash, prompt_version, total_expected (12), total_generated, timestamps</text>
    <text x="20" y="64" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155">ai_campaign_assets: id, job_id, group_name (moderna|clean|retail), format (1:1|4:5|16:9|9:16), status, image_url, dimensoes, prompt_version</text>
    <text x="20" y="84" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#334155">ai_campaign_errors: job_id, group, format, error_type, error_message, attempt</text>
    <line x1="20" y1="98" x2="820" y2="98" stroke="#e2e8f0"/>
    <text x="20" y="120" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#0f172a">Status do job (regra de fechamento):</text>
    <text x="20" y="138" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#475569">12/12 completed = completed  |  alguns OK = partial  |  nenhum OK = failed</text>
    <text x="20" y="162" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Referencia: ai-step2/CONTRACT.md - Codigo: supabase/functions/create-ai-campaign-job, generate-ai-campaign-image, _shared/ai-campaign/*</text>
    <text x="20" y="182" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748b">Artefato para documentacao do produto - abril/2026</text>
  </g>

  <path d="M 460 380 L 460 392" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 460 724 L 460 748" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 460 1044 L 460 1068" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 460 1288 L 460 1300" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
</svg>
